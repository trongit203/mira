[versions]
agp = "9.1.0"
coreKtx = "1.15.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
appcompat = "1.6.1"
material = "1.10.0"
material3 = "1.4.0"
hiltAndroid = "2.54"
hiltNavigationCompose = "1.3.0"
kotlin = "2.0.21"
room3Version = "3.0.0-alpha02"
ksp = "2.0.21-1.0.28"
foundationLayout = "1.10.6"
compose-icons = "1.7.0"
mockk = "1.13.10"
kotlinx-coroutines-test = "1.8.0"
turbine = "1.1.0"
hilt-android-testing = "2.54"
